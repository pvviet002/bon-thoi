        /* Hiệu ứng rung lắc khi bé chọn sai */
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        /* Hiệu ứng xoay chậm cho ngôi sao chiến thắng */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;

            const [gameState, setGameState] = useState('START'); // START, PLAYING, END
            const [targetItem, setTargetItem] = useState(null);
            const [options, setOptions] = useState([]);
            const [score, setScore] = useState(0);
            const [wrongClickedId, setWrongClickedId] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);

            // Ref lưu trữ lịch sử để chống lặp
            const usedItemsRef = useRef([]);
            const recentPraisesRef = useRef([]);
            const recentQuestionsRef = useRef([]); 
            const currentQuestionRef = useRef(""); 
            
            // Ref quản lý các timeout chờ thao tác
            const activeTimeoutsRef = useRef([]);

            useEffect(() => {
                return () => {
                    activeTimeoutsRef.current.forEach(clearTimeout);
                    window.speechSynthesis.cancel();
                };
            }, []);

            const setSafeTimeout = (callback, delay) => {
                const timer = setTimeout(callback, delay);
                activeTimeoutsRef.current.push(timer);
                return timer;
            };

            const speak = useCallback((text, rate = 0.85, onEndCallback = null) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    const bestVoice = voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && (v.name.includes('Neural') || v.name.includes('HoaiMy')))
                                   || voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && v.name.includes('Google'))
                                   || voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                                   
                    if (bestVoice) utterance.voice = bestVoice;
                    
                    utterance.lang = 'vi-VN';
                    utterance.rate = rate; 
                    utterance.pitch = 1.1; 

                    if (onEndCallback) {
                        let isEnded = false;
                        const handleEnd = () => {
                            if (!isEnded) {
                                isEnded = true;
                                onEndCallback();
                            }
                        };
                        utterance.onend = handleEnd;
                        utterance.onerror = handleEnd;
                        setSafeTimeout(handleEnd, text.length * 150 + 1500); 
                    }

                    window.speechSynthesis.speak(utterance);
                } else {
                    if (onEndCallback) setSafeTimeout(onEndCallback, 2000);
                }
            }, []);

            const generateQuestion = useCallback(() => {
                const items = lessonInfo.items;
                
                let availableItems = items.filter(item => !usedItemsRef.current.includes(item.id));
                
                if (availableItems.length === 0) {
                    usedItemsRef.current = [];
                    availableItems = items;
                }

                const randomTargetIndex = Math.floor(Math.random() * availableItems.length);
                const target = availableItems[randomTargetIndex];

                usedItemsRef.current.push(target.id);

                let wrongIndex = Math.floor(Math.random() * items.length);
                while (items[wrongIndex].id === target.id) {
                    wrongIndex = Math.floor(Math.random() * items.length);
                }
                const wrong = items[wrongIndex];

                const newOptions = Math.random() > 0.5 ? [target, wrong] : [wrong, target];
                
                setTargetItem(target);
                setOptions(newOptions);
                setWrongClickedId(null);
                setShowSuccess(false);

                const questionTemplates = [
                    (name) => `Cô đố con tìm thấy, ${name} ở đâu nhỉ?`,
                    (name) => `Con chỉ cho cô xem, ${name} ở đâu nào?`,
                    (name) => `Đâu là ${name} vậy con?`,
                    (name) => `Con có thấy ${name} ở đâu không?`,
                    (name) => `${name} đang trốn ở đâu nhỉ?`
                ];

                let availableIndices = [0, 1, 2, 3, 4].filter(idx => !recentQuestionsRef.current.includes(idx));
                if (availableIndices.length === 0) availableIndices = [0, 1, 2, 3, 4];
                const selectedIdx = availableIndices[Math.floor(Math.random() * availableIndices.length)];
                
                recentQuestionsRef.current.push(selectedIdx);
                if (recentQuestionsRef.current.length > 2) recentQuestionsRef.current.shift();
                
                const questionText = questionTemplates[selectedIdx](target.name);
                currentQuestionRef.current = questionText; 

                setSafeTimeout(() => {
                    speak(questionText);
                }, 500);
            }, [speak, lessonInfo]);

            const startGame = () => {
                setScore(0);
                usedItemsRef.current = []; 
                recentQuestionsRef.current = [];
                speak(`Cô chào con! Chào mừng con đến với bài học: ${lessonInfo.title}!`, 0.85, () => {
                    setGameState('PLAYING');
                    generateQuestion();
                });
            };

            const handleItemClick = (item) => {
                if (showSuccess) return; 

                if (item.id === targetItem.id) {
                    setShowSuccess(true);
                    setScore(s => s + 1);
                    
                    const applause = document.getElementById('applauseSound');
                    if (applause) {
                        applause.currentTime = 0;
                        applause.play().catch(e => console.log("Lỗi phát audio:", e));
                    }

                    const praisesList = [
                        "Tuyệt vời quá, con chọn đúng rồi!",
                        "Con của cô xuất sắc quá!",
                        "Hoan hô con, đúng rồi!",
                        "Giỏi quá, con làm tốt lắm!",
                        "Chính xác luôn, con thật thông minh!"
                    ];

                    let availablePraises = praisesList.filter(p => !recentPraisesRef.current.includes(p));
                    if (availablePraises.length === 0) availablePraises = praisesList;
                    
                    const selectedPraise = availablePraises[Math.floor(Math.random() * availablePraises.length)];
                    
                    recentPraisesRef.current.push(selectedPraise);
                    if (recentPraisesRef.current.length > 2) recentPraisesRef.current.shift();

                    speak(`${selectedPraise} Đây là ${targetItem.name}.`, 0.85, () => {
                        setSafeTimeout(() => {
                            if (score + 1 >= lessonInfo.items.length) {
                                setGameState('END');
                                speak("Cô chúc mừng con đã hoàn thành xuất sắc toàn bộ bài học! Cô thưởng cho con 5 ngôi sao nhé!");
                            } else {
                                generateQuestion();
                            }
                        }, 800);
                    });

                } else {
                    setWrongClickedId(item.id);
                    speak(`Đây là ${item.name}, con hãy chọn lại nhé!`);
                    setSafeTimeout(() => setWrongClickedId(null), 1000);
                }
            };

            const repeatQuestion = () => {
                if (currentQuestionRef.current) {
                    speak(currentQuestionRef.current);
                }
            };

            if (gameState === 'START') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 font-sans relative">
                        <button onClick={onBack} className="absolute top-6 left-6 flex items-center gap-2 bg-white text-indigo-500 hover:bg-indigo-100 px-4 py-2 rounded-xl shadow-md font-bold transition-transform active:scale-90">
                            <IconArrowLeft size={24} /> Quay lại
                        </button>
                        <div className={`bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 ${lessonInfo.color.replace('bg-', 'border-')} transform transition hover:scale-105`}>
                            <div className="text-6xl mb-4">{lessonInfo.icon}</div>
                            <h1 className={`text-4xl font-bold mb-8 font-sans ${lessonInfo.color.replace('bg-', 'text-').replace('-400', '-600')}`}>
                                {lessonInfo.title}
                            </h1>
                            <button 
                                onClick={startGame}
                                className={`w-full ${lessonInfo.color} hover:opacity-90 text-white text-3xl font-bold py-6 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-4 transition-transform active:scale-95`}
                            >
                                <IconPlay size={40} fill="currentColor" /> Bắt đầu học
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'END') {
                return (
                    <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4 font-sans">

                            <h1 className="text-4xl font-bold text-yellow-500 mb-4">Con Giỏi Quá!</h1>
                            <div className="flex justify-center gap-2 mb-8">

                                    <IconStar key={i} size={48} className="text-yellow-400 animate-spin-slow" fill="currentColor" />
                                ))}
                            </div>
                            <p className="text-2xl text-gray-700 mb-8">Con đã hoàn thành xuất sắc!</p>
                            <div className="flex flex-col gap-4">
                                <button 
                                    onClick={startGame}
                                    className="w-full bg-sky-500 hover:bg-sky-600 text-white text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95"
                                >
                                    <IconRefresh size={28} /> Chơi lại bài này
                                </button>
                                <button 
                                    onClick={onBack}
                                    className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95"
                                >
                                    <IconHome size={28} /> Về màn hình chính
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-between p-6 font-sans">
                    <div className="w-full max-w-2xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-md border-2 border-slate-200">
                        <button onClick={onBack} className="text-slate-400 hover:text-red-500 bg-slate-100 p-2 rounded-full active:scale-90 transition">
                            <IconArrowLeft size={28} />
                        </button>
                        <div className="flex gap-1 flex-1 justify-center">
                            {[...Array(5)].map((_, i) => {
                                const activeStars = score === 0 ? 0 : ((score - 1) % 5) + 1;
                                return <IconStar key={i} size={32} className={i < activeStars ? "text-yellow-400 transform scale-110" : "text-gray-200"} fill={i < activeStars ? "currentColor" : "none"} />
                            })}
                        </div>
                        <button onClick={repeatQuestion} className="bg-blue-100 hover:bg-blue-200 text-blue-600 p-3 rounded-full active:scale-90 transition">
                            <IconVolume2 size={32} />
                        </button>
                    </div>

                    <div className="flex-1 w-full max-w-2xl flex flex-col items-center justify-center gap-8 my-8">
                        <h2 className={`text-4xl md:text-5xl font-bold text-center drop-shadow-sm ${lessonInfo.color.replace('bg-', 'text-').replace('-400', '-600')}`}>
                            {targetItem && `Cô đố con tìm: ${targetItem.name.toUpperCase()}`}
                        </h2>

                        <div className="flex flex-col sm:flex-row gap-6 w-full px-4 justify-center">

                                const isWrong = wrongClickedId === item.id;
                                const isCorrectTarget = showSuccess && item.id === targetItem?.id;
                                
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => handleItemClick(item)}
                                        className={`
                                            flex-1 aspect-square max-w-[320px] mx-auto flex items-center justify-center transition-all duration-300 bg-transparent rounded-full
                                            ${isWrong ? 'animate-shake opacity-75' : 'hover:scale-110'}
                                            ${isCorrectTarget ? 'scale-125' : ''}
                                            ${showSuccess && !isCorrectTarget ? 'opacity-20 scale-75' : ''}
                                            active:scale-95 text-slate-800
                                        `}
                                    >
                                        {lessonInfo.id === 'dem_ngon_tay' ? (
                                            <div className="w-[140px] h-[140px] sm:w-[180px] sm:h-[180px] md:w-[220px] md:h-[220px] flex items-center justify-center">
                                                <HandIcon count={item.count} />
                                            </div>
                                        ) : (
                                            <span 
                                                className={lessonInfo.id === 'chu_cai' || lessonInfo.id === 'chu_so' ? "text-[140px] sm:text-[180px] md:text-[220px] font-black drop-shadow-xl" : "text-[140px] sm:text-[180px] md:text-[220px] drop-shadow-2xl"}
                                                style={lessonInfo.id === 'chu_cai' ? { fontFamily: '"Times New Roman"' } : {}}
                                            >
                                                {item.emoji}
                                            </span>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {showSuccess && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50">
                             <div className="text-6xl animate-bounce">🎉 🎈 🎉</div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // COMPONENT TRÒ CHƠI KÉO THẢ (GHÉP BÓNG)

        const DragDropGame = ({ lessonInfo, onBack }) => {

            const [draggedId, setDraggedId] = useState(null);

            const [wrongDragId, setWrongDragId] = useState(null);

            const recentPraisesRef = useRef([]);

                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    const bestVoice = voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && (v.name.includes('Neural') || v.name.includes('HoaiMy')))
                                   || voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && v.name.includes('Google'))
                                   || voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                                   
                    if (bestVoice) utterance.voice = bestVoice;

                        const handleEnd = () => {
                            if (!isEnded) {
                                isEnded = true;
                                onEndCallback();
                            }

                        utterance.onend = handleEnd;
                        utterance.onerror = handleEnd;
                        setSafeTimeout(handleEnd, text.length * 150 + 1500); 
                    }
                    window.speechSynthesis.speak(utterance);
                } else {
                    if (onEndCallback) setSafeTimeout(onEndCallback, 2000);
                }
            }, []);

            const generateQuestion = useCallback(() => {
                const items = lessonInfo.items;
                let availableItems = items.filter(item => !usedItemsRef.current.includes(item.id));
                
                // Nếu đã hỏi hết, reset lại ngân hàng câu hỏi
                if (availableItems.length === 0) {
                    usedItemsRef.current = [];
                    availableItems = items;
                }

                const targetIndex = Math.floor(Math.random() * availableItems.length);
                const target = availableItems[targetIndex];
                usedItemsRef.current.push(target.id);

                // Chọn 2 đáp án sai ngẫu nhiên
                let wrongItems = items.filter(item => item.id !== target.id);
                wrongItems.sort(() => Math.random() - 0.5);
                
                const newOptions = [target, wrongItems[0], wrongItems[1]];
                newOptions.sort(() => Math.random() - 0.5); // Đảo vị trí 3 thẻ
                
                setTargetItem(target);
                setOptions(newOptions);
                setShowSuccess(false);
                setWrongDragId(null);

                setSafeTimeout(() => {
                    speak(`Cô đố con tìm hình, và kéo vào đúng bóng đen nhé!`);
                }, 500);
            }, [speak, lessonInfo]);

            const startGame = () => {
                setScore(0);
                usedItemsRef.current = [];
                speak(`Cô chào con! Chào mừng con đến với bài học: ${lessonInfo.title}!`, 0.85, () => {
                    setGameState('PLAYING');
                    generateQuestion();
                });
            };

            // Sự kiện khi bắt đầu chạm ngón tay vào hình
            const handlePointerDown = (e, item) => {
                if (showSuccess) return;
                setDraggedId(item.id);
                setDragPos({ x: e.clientX, y: e.clientY });
            };

            // Sự kiện khi di chuyển ngón tay (kéo đi)
            const handlePointerMove = (e) => {
                if (draggedId) {
                    setDragPos({ x: e.clientX, y: e.clientY });
                }
            };

            // Sự kiện khi nhấc ngón tay lên (Thả ra)
            const handlePointerUp = (e) => {
                if (!draggedId) return;

                let isDroppedInside = false;
                if (dropZoneRef.current) {
                    const rect = dropZoneRef.current.getBoundingClientRect();
                    const padding = 30; // Mở rộng vùng nhận diện thả
                    if (
                        e.clientX >= rect.left - padding && e.clientX <= rect.right + padding &&
                        e.clientY >= rect.top - padding && e.clientY <= rect.bottom + padding
                    ) {
                        isDroppedInside = true;
                    }
                }

                if (isDroppedInside) {
                    if (draggedId === targetItem.id) {

                                } else {
                                    generateQuestion();
                                }
                            }, 1000);
                        });
                    } else {
                        // Kéo thả SAI
                        const draggedObj = options.find(o => o.id === draggedId);
                        setWrongDragId(draggedId);
                        setDraggedId(null);
                        speak(`Đây là ${draggedObj.name}, chưa khớp bóng rồi con ạ!`);
                        setSafeTimeout(() => setWrongDragId(null), 1000);
                    }
                } else {
                    // Thả ra bên ngoài bóng đen (hủy kéo)
                    setDraggedId(null);
                }
            };

                speak(`Con hãy tìm hình và kéo vào đúng bóng đen nhé!`);

                                className={`w-full ${lessonInfo.color} hover:opacity-90 text-white text-3xl font-bold py-6 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-4 transition-transform active:scale-95`}
                            >
                                <IconPlay size={40} fill="currentColor" /> Bắt đầu học
                            </button>
                        </div>
                    </div>

                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 border-yellow-400">
                            <h1 className="text-4xl font-bold text-yellow-500 mb-4">Con Giỏi Quá!</h1>
                            <div className="flex justify-center gap-2 mb-8">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <IconStar key={i} size={48} className="text-yellow-400 animate-spin-slow" fill="currentColor" />
                                ))}

                        <div className="flex gap-1 flex-1 justify-center">

                                const activeStars = score === 0 ? 0 : ((score - 1) % 5) + 1;

                    <div className="flex-1 w-full max-w-2xl flex flex-col items-center justify-center gap-4 my-4 relative">
                        <h2 className="text-3xl md:text-4xl font-bold text-center drop-shadow-sm text-rose-600 mb-8">
                            Kéo hình vào bóng đen
                        </h2>

                        {/* VÙNG THẢ (BÓNG ĐEN) */}
                        {targetItem && (
                            <div 
                                ref={dropZoneRef} 
                                className={`w-48 h-48 sm:w-64 sm:h-64 rounded-full flex items-center justify-center mb-12 transition-all duration-500
                                    ${showSuccess ? 'bg-green-100 border-4 border-green-400 scale-110 shadow-2xl' : 'bg-slate-200 border-8 border-dashed border-slate-300'}
                                `}
                            >
                                <span 
                                    className="text-[120px] sm:text-[160px] drop-shadow-md transition-all duration-500" 
                                    style={{ filter: showSuccess ? 'none' : 'brightness(0) opacity(0.15)' }} // Biến thành bóng đen
                                >
                                    {targetItem.emoji}
                                </span>
                            </div>
                        )}

                        {/* DANH SÁCH 3 LỰA CHỌN */}
                        <div className="flex justify-center gap-4 sm:gap-8 w-full px-2 z-20">
                            {options.map((item) => {
                                const isDragging = draggedId === item.id;
                                const isWrong = wrongDragId === item.id;
                                const isCorrectAndSuccess = showSuccess && item.id === targetItem.id;

                                return (
                                    <div key={item.id} className="w-[90px] h-[90px] sm:w-[120px] sm:h-[120px] relative">
                                        {!isCorrectAndSuccess && (
                                            <button
                                                onPointerDown={(e) => handlePointerDown(e, item)}
                                                style={{
                                                    position: isDragging ? 'fixed' : 'relative',
                                                    left: isDragging ? dragPos.x : 'auto',
                                                    top: isDragging ? dragPos.y : 'auto',
                                                    transform: isDragging ? 'translate(-50%, -50%) scale(0.7)' : 'none',
                                                    zIndex: isDragging ? 1000 : 1,
                                                    touchAction: 'none',
                                                    opacity: isDragging ? 0.85 : 1
                                                }}
                                                className={`
                                                    w-[90px] h-[90px] sm:w-[120px] sm:h-[120px] flex items-center justify-center bg-white rounded-3xl shadow-lg border-4 
                                                    ${isWrong ? 'border-red-400 animate-shake bg-red-50' : 'border-gray-200'}
                                                    transition-colors duration-200 active:scale-110 cursor-grab
                                                `}
                                            >
                                                <span className="text-[50px] sm:text-[70px] drop-shadow-lg pointer-events-none">
                                                    {item.emoji}
                                                </span>
                                            </button>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {showSuccess && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50">
                             <div className="text-6xl animate-bounce">🎉 🎈 🎉</div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // COMPONENT CHÍNH (MENU MỤC LỤC)
        // ==========================================
        const App = () => {
            const [selectedLessonId, setSelectedLessonId] = useState(null);
            const [ttsWarning, setTtsWarning] = useState('');
            const [userInteracted, setUserInteracted] = useState(false); 

            useEffect(() => {
                const checkVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        const hasVietnamese = voices.some(v => v.lang.includes('vi') || v.lang.includes('VN'));
                        if (!hasVietnamese) {
                            setTtsWarning('Máy của bạn chưa cài Giọng đọc tiếng Việt. Vui lòng mở bằng Google Chrome hoặc tải giọng tiếng Việt trong Cài đặt hệ thống.');
                        } else {
                            setTtsWarning('');
                        }
                    }
                };
                checkVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = checkVoices;
                }
            }, []);

            const handleStartApp = () => {
                setUserInteracted(true);
                // Mồi audio tiếng vỗ tay ngay khi người dùng bấm chạm vào màn hình lần đầu
                // Cực kỳ quan trọng để lách luật bảo mật chặn âm thanh của Apple (iOS/iPadOS)
                const applause = document.getElementById('applauseSound');
                if (applause) {
                    applause.play().then(() => {
                        applause.pause();
                        applause.currentTime = 0;
                    }).catch(e => console.log("Lỗi mồi audio:", e));
                }
            };

            // Màn hình Chào Mừng (Để mở khóa quyền phát âm thanh)
            if (!userInteracted) {
                return (
                    <div className="min-h-screen bg-sky-50 flex flex-col items-center justify-center p-4 font-sans">
                        {/* Thẻ audio ẩn trên DOM, pre-load trước tiếng vỗ tay */}
                        <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>
                        
                        <div className="text-center mb-12">
                            <h1 className="text-5xl md:text-7xl font-bold text-sky-600 mb-4 drop-shadow-sm flex items-center justify-center gap-4">
                                <IconStar className="text-yellow-400 animate-pulse" size={56} fill="currentColor"/> 
                                Bé Vui Học 
                                <IconStar className="text-yellow-400 animate-pulse" size={56} fill="currentColor"/>
                            </h1>
                            <p className="text-2xl text-gray-500 font-medium mt-6">Cùng chơi và học nhé!</p>
                        </div>
                        <button 
                            onClick={handleStartApp}
                            className="bg-green-500 hover:bg-green-600 text-white text-4xl md:text-5xl font-bold py-8 px-16 rounded-[3rem] shadow-xl animate-bounce active:scale-95 transition-transform border-4 border-green-300"
                        >
                            Vào Chơi Ngay!
                        </button>
                    </div>
                );
            }

            if (selectedLessonId) {
                const lessonInfo = LESSONS_DATA[selectedLessonId];
                return (
                    <>
                        <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>
                        {lessonInfo.type === 'drag_drop' ? (
                            <DragDropGame 
                                lessonInfo={lessonInfo} 
                                onBack={() => {
                                    window.speechSynthesis.cancel();
                                    setSelectedLessonId(null);
                                }} 
                            />
                        ) : (
                            <LessonGame 
                                lessonInfo={lessonInfo} 
                                onBack={() => {
                                    window.speechSynthesis.cancel();
                                    setSelectedLessonId(null);
                                }} 
                            />
                        )}
                    </>
                );
            }

            return (
                <div className="min-h-screen bg-sky-50 flex flex-col items-center py-10 px-4 font-sans relative">
                    <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>

                    {ttsWarning && (
                        <div className="w-full max-w-3xl bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 p-4 mb-6 rounded shadow-md text-sm md:text-base">
                            <p><strong>Lưu ý:</strong> {ttsWarning}</p>
                        </div>
                    )}

                    <div className="text-center mb-10">
                        <h1 className="text-5xl md:text-6xl font-bold text-sky-600 mb-4 drop-shadow-sm flex items-center justify-center gap-4">
                            <IconStar className="text-yellow-400" size={48} fill="currentColor"/> 
                            Bé Vui Học 
                            <IconStar className="text-yellow-400" size={48} fill="currentColor"/>
                        </h1>
                        <p className="text-xl text-gray-500 font-medium">Con hãy chọn một bài học bên dưới nhé!</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full max-w-7xl">
                        {Object.values(LESSONS_DATA).map((lesson) => (
                            <button
                                key={lesson.id}
                                onClick={() => setSelectedLessonId(lesson.id)}
                                className={`${lesson.color} hover:opacity-90 transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl shadow-lg rounded-3xl p-6 flex flex-col items-center justify-center gap-4 text-white group active:scale-95`}
                            >
                                <div className="text-7xl group-hover:scale-110 transition-transform duration-300 drop-shadow-lg">
                                    {lesson.icon}
                                </div>
                                <h2 className="text-2xl font-bold text-center">
                                    {lesson.title}
                                </h2>
                            </button>
                        ))}
                    </div>
                    
                    <div className="mt-12 text-gray-400 text-sm font-medium">
                        Ứng dụng thiết kế đặc biệt cho trẻ mầm non
                    </div>
                </div>
            );
        };

        // Render App vào div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
